<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

    }

    table{
        margin: 50px;
    }

    td{
        font-size: 50px;
        border: 1px solid black;
        width: 100px;
        height: 100px;
        text-align: center;
    }
    td:hover{
        background-color: rgba(0, 0, 0, 0.219);
    }
/* Estilo base do botão */
.google-btn {
    display: inline-block;
    font-family: 'Roboto', Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    color: white;
    background-color: #4285f4; /* Azul padrão do Google */
    box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

/* Efeito hover */
.google-btn:hover {
    background-color: #3367d6;
    box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.2);
}

/* Efeito quando o botão está ativo */
.google-btn:active {
    background-color: #2a56c6;
    box-shadow: 0px 2px 2px rgba(0, 0, 0, 0.3);
}

/* Estilo para botão desabilitado */
.google-btn:disabled {
    background-color: #d6d6d6;
    color: #9e9e9e;
    cursor: not-allowed;
    box-shadow: none;
}
#win{
    position: relative;
    top: 10px;
    font-size: 50px;
    text-align: center;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
<body>
    <table>
        <tr>
            <td onclick="matrix(0,0)"></td>
            <td onclick="matrix(0,1)"></td>
            <td onclick="matrix(0,2)"></td>
        </tr>
        <tr>
            <td onclick="matrix(1,0)"></td>
            <td onclick="matrix(1,1)"></td>
            <td onclick="matrix(1,2)"></td>
        </tr>
        <tr>
            <td onclick="matrix(2,0)"></td>
            <td onclick="matrix(2,1)"></td>
            <td onclick="matrix(2,2)"></td>
        </tr>
    </table>
    <button class="google-btn"   onclick="clearMatrix()">limpar</button>
    <div id="win">
    </div>
<script src="rede neural.js"></script>
<script src="script.js"></script>
</body>
</html>
